<!doctype html>
<html lang="en">

<!--metadate, de exemplu fontul folosit, fisierul css atasat si titlul paginii-->

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="CreateAccount.css" />
  <title>Farmacia Miorița</title>
</head>

<body>
  <!-- sectiunea de hero care la pagina de user login este numai logo-ul -->
  <section id="hero" class="hero">
    <div class="heroLogo">
      <div class="heroLogoText">
        <p>Farmacia Miorița &hearts;</p>
      </div>
      <div class="heroLogoImagine">
        <img
          src="https://e7.pngegg.com/pngimages/1014/378/png-clipart-shetland-sheep-computer-icons-black-sheep-wool-glass-glass-logo.png"
          alt="Farmacia Miorița logo" />
      </div>
    </div>
  </section>

  <section id="login" class="login">
    <form class="formular">
      <div class="titluLogin">
        Creare cont
      </div>
      <div class="elementFormular">
        <div class="elementFormularLabel">
          <input type="text" id="email" name="email">
        </div>
        <div class="elementFormularInput">
          <label for="user">E-mail</label>
        </div>
      </div>

      <div class="elementFormular">
        <div class="elementFormularLabel">
          <input type="text" id="user" name="user">
        </div>
        <div class="elementFormularInput">
          <label for="user">Username</label>
        </div>
      </div>

      <div class="elementFormular">
        <div class="elementFormularLabel">
          <input type="password" id="parola" name="parola">
        </div>
        <div class="elementFormularInput">
          <label for="parola">Parola</label>
        </div>
      </div>
      <div class="elementFormular">
        <div class="elementFormularLabel">
          <input type="password" id="parolaVerificare" name="parolaVerificare">
        </div>
        <div class="elementFormularInput">
          <label for="parolaVerificare">Reintrodu parola</label>
        </div>
      </div>
      <div class="loginSuplimentar">
        <div class="butonLogareFormular">
          <button class="butonLogare">
            <a href="../LoginCont/UserLogin.html">Creeaza cont</a>
          </button>
        </div>
      </div>
    </form>
  </section>

  <footer id="info" class="info">
    <div class="footerBottom">
      <p>&copy; Farmacia Miorita &hearts; 2026 toate drepturile rezervate</p>
    </div>
  </footer>


</body>

</html>
